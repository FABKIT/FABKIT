name: Generate Release Changelog

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: CHANGES.md

      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.event.release.tag_name }}" --notes-file CHANGES.md
